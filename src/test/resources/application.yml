spring:
  datasource:
    url: jdbc:h2:mem:gaetteok-test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
gaetteok:
  realtime:
    allowed-origins: "*"
    websocket-path: /ws/rooms
