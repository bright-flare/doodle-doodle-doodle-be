spring:
  config:
    activate:
      on-profile: prd
  datasource:
    url: ${GAETTEOK_DB_URL}
    username: ${GAETTEOK_DB_USERNAME}
    password: ${GAETTEOK_DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${GAETTEOK_DB_POOL_SIZE:20}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
management:
  endpoint:
    health:
      probes:
        enabled: true
