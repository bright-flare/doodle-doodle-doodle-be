spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: ${GAETTEOK_DB_URL:jdbc:postgresql://127.0.0.1:5432/gaetteok}
    username: ${GAETTEOK_DB_USERNAME:gaetteok}
    password: ${GAETTEOK_DB_PASSWORD:gaetteok}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${GAETTEOK_DB_POOL_SIZE:8}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
